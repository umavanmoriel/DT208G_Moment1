<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <header>

    <main>
      <section>
        <h1>Lägg till kursen</h1>
        <form class="addCourse-form" action="">
          <div class="input-label-section">
            <label for="courseCode">Kurskod</label>
            <input class="form-input" type="text" id="code" name="courseCode">
          </div>
          <div class="input-label-section">
            <label for="courseName">Kursnamn</label>
            <input class="form-input" type="text" id="name" name="courseName">
          </div>
          <div class="input-label-section">
            <label for="progression">Progression</label>
            <input class="form-input" type="text" id="progression" name="progression">
          </div>
          <div class="input-label-section">
            <label for="syllabus">Syllabus</label>
            <input class="form-input" type="text" id="syllabus" name="syllabus">
          </div>
          <button class="form-button" id="addCourseButton">Lägg till kurs</button>
        </form>
        <div>
        <ul id="errors" class="errors">

        </ul>
        </div>
      </section>
        <div class="table-section">
          <h2>Mina kurser</h2>
          <table class="courses-table" id="coursesTable">
              <thead>
                  <tr>
                      <th>Kursnamn</th>
                      <th>Kursnamn</th>

                      <th>Syllabus</th>

              </tbody>
